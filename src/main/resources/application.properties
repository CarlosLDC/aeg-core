spring.application.name=core

# DigitalOcean App Platform (y similares) inyectan PORT.
server.port=${PORT:8080}

# Health público para comprobaciones del balanceador (resto de actuator sigue protegido por Security).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Datasource values are populated early by DatabaseUrlEnvironmentPostProcessor.
# App Platform may inject DATABASE_URL; local overrides can still use SPRING_ vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aeg_core}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool settings
spring.datasource.hikari.connection-timeout=45000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000

# Explicit SSL for PostgreSQL driver
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false
spring.flyway.validate-on-migrate=false

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Orígenes del panel (CORS). Separados por coma; en DO App Platform puedes sobreescribir APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200,https://aeg-core-admin.vercel.app,https://aeg-admin.tech,https://www.aeg-admin.tech}

app.security.admin.name=Edgar Rivera
app.security.admin.username=segar12345@gmail.com
app.security.admin.password=aeg-r1

# MQTT Configuration
app.mqtt.broker-url=tcp://${MQTT_BROKER_HOST:${MQTT_HOST:10.116.0.4}}:${MQTT_BROKER_PORT:${MQTT_PORT:1883}}
app.mqtt.client-id=aeg-core-server
app.mqtt.default-topic=aeg/commands
app.mqtt.username=${MQTT_USER:}
app.mqtt.password=${MQTT_PASS:}
