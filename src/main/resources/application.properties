spring.application.name=core

# Arranque más liviano en contenedores pequeños (App Platform 1 vCPU / 1 GB).
spring.jmx.enabled=false

# DigitalOcean App Platform (y similares) inyectan PORT.
server.port=${PORT:8080}

# Health público para comprobaciones del balanceador (resto de actuator sigue protegido por Security).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
# Readiness solo cuando la JVM y la BD responden (MQTT puede reconectar en segundo plano).
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState

# Datasource values are populated early by DatabaseUrlEnvironmentPostProcessor.
# App Platform may inject DATABASE_URL; local overrides can still use SPRING_ vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aeg_core}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool settings
spring.datasource.hikari.connection-timeout=45000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000

# Explicit SSL for PostgreSQL driver
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false
spring.flyway.validate-on-migrate=false

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Orígenes del panel (CORS). Separados por coma; en DO App Platform puedes sobreescribir APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200,https://aeg-core-admin.vercel.app,https://aeg-admin.tech,https://www.aeg-admin.tech}

app.security.admin.name=Edgar Rivera
app.security.admin.username=segar12345@gmail.com
app.security.admin.password=aeg-r1

# MQTT Configuration (MQTT_URL tiene prioridad; p. ej. tcp://host:1883 en App Platform)
app.mqtt.broker-url=${MQTT_URL:tcp://${MQTT_BROKER_HOST:${MQTT_HOST:10.116.0.4}}:${MQTT_BROKER_PORT:${MQTT_PORT:1883}}}
app.mqtt.client-id=${MQTT_CLIENT_ID:aeg-core-server}
app.mqtt.default-topic=aeg/commands
app.mqtt.username=${MQTT_USER:}
app.mqtt.password=${MQTT_PASS:}
# Suscripción entrante; desactívala (false) si solo publicas desde el API y el broker cierra la conexión al suscribir.
app.mqtt.inbound.enabled=${MQTT_INBOUND_ENABLED:true}
app.mqtt.inbound.topic=${MQTT_INBOUND_TOPIC:aeg/telemetry/#}
app.mqtt.monitor.buffer-size=${MQTT_MONITOR_BUFFER_SIZE:200}
