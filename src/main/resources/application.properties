spring.application.name=core

# Arranque más liviano en contenedores pequeños (App Platform 1 vCPU / 1 GB).
spring.jmx.enabled=false

# DigitalOcean App Platform (y similares) inyectan PORT.
server.port=${PORT:8080}

# Health público para comprobaciones del balanceador (resto de actuator sigue protegido por Security).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
# Readiness: JVM + BD. Liveness: solo JVM (usar /actuator/health/liveness en el probe de App Platform).
management.endpoint.health.group.readiness.include=readinessState,db
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.show-details=never

# Datasource values are populated early by DatabaseUrlEnvironmentPostProcessor.
# App Platform may inject DATABASE_URL; local overrides can still use SPRING_ vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aeg_core}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool settings
spring.datasource.hikari.connection-timeout=45000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000

# Explicit SSL for PostgreSQL driver
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false
spring.flyway.validate-on-migrate=true

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Orígenes del panel (CORS). Separados por coma; en DO App Platform puedes sobreescribir APP_CORS_ALLOWED_ORIGINS.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:4200,https://aeg-core-admin.vercel.app,https://aeg-admin.tech,https://www.aeg-admin.tech}

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:}
app.security.admin.name=${APP_SECURITY_ADMIN_NAME:Administrador}
app.security.admin.username=${APP_SECURITY_ADMIN_USERNAME:}
app.security.admin.password=${APP_SECURITY_ADMIN_PASSWORD:}
app.security.basic-auth.enabled=${APP_SECURITY_BASIC_AUTH_ENABLED:false}
app.security.swagger-enabled=${APP_SECURITY_SWAGGER_ENABLED:false}
app.security.strict-cors=${APP_SECURITY_STRICT_CORS:true}

# MQTT Configuration (MQTT_URL tiene prioridad; p. ej. tcp://host:1883 en App Platform)
app.mqtt.broker-url=${MQTT_URL:tcp://${MQTT_BROKER_HOST:${MQTT_HOST:206.189.231.128}}:${MQTT_BROKER_PORT:${MQTT_PORT:1883}}}
app.mqtt.client-id=${MQTT_CLIENT_ID:aeg-core-server}
app.mqtt.default-topic=aeg/commands
app.mqtt.username=${MQTT_USER:}
app.mqtt.password=${MQTT_PASS:}
# Suscripción entrante; desactívala (false) si solo publicas desde el API y el broker cierra la conexión al suscribir.
app.mqtt.inbound.enabled=${MQTT_INBOUND_ENABLED:true}
app.mqtt.inbound.topic=${MQTT_INBOUND_TOPIC:aeg/telemetry/#}
app.mqtt.monitor.buffer-size=${MQTT_MONITOR_BUFFER_SIZE:200}

# Enajenación automática vía MQTT (protocolo fiscal AEG)
app.mqtt.enajenacion.enabled=${MQTT_ENAJENACION_ENABLED:true}
app.mqtt.enajenacion.inbound-topic=${MQTT_ENAJENACION_INBOUND_TOPIC:+/AEG_Fiscal/Integracion/CmdServer}
app.mqtt.enajenacion.skip-registration-status=${MQTT_ENAJENACION_SKIP_REG_STATUS:false}
app.mqtt.enajenacion.timeout.dnf-seconds=${MQTT_ENAJENACION_TIMEOUT_DNF:180}
app.mqtt.enajenacion.timeout.fiscal-rif-seconds=${MQTT_ENAJENACION_TIMEOUT_FISCAL_RIF:120}
app.mqtt.enajenacion.timeout.config-seconds=${MQTT_ENAJENACION_TIMEOUT_CONFIG:60}
app.mqtt.enajenacion.timeout.reg-status-seconds=${MQTT_ENAJENACION_TIMEOUT_REG_STATUS:60}
app.mqtt.enajenacion.timeout.invoice-seconds=${MQTT_ENAJENACION_TIMEOUT_INVOICE:180}
app.mqtt.enajenacion.timeout.credit-note-seconds=${MQTT_ENAJENACION_TIMEOUT_CREDIT_NOTE:180}
app.mqtt.enajenacion.timeout.report-z-seconds=${MQTT_ENAJENACION_TIMEOUT_REPORT_Z:120}
# Líneas opcionales de pie de ticket para paramFacSPIFF.json, separadas por "|".
app.mqtt.enajenacion.ticket-footer-lines=${MQTT_ENAJENACION_TICKET_FOOTER_LINES:}
app.mqtt.enajenacion.activity.buffer-size=${MQTT_ENAJENACION_ACTIVITY_BUFFER_SIZE:300}
