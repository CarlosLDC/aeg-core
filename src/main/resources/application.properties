spring.application.name=core

# DigitalOcean App Platform (y similares) inyectan PORT.
server.port=${PORT:8080}

# Health público para comprobaciones del balanceador (resto de actuator sigue protegido por Security).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# En producción: definir SPRING_DATASOURCE_URL (o url/username/password) y secretos; Flyway migrará al arranque.
# spring.jpa.hibernate.ddl-auto por defecto no crea esquema en Postgres si usas solo Flyway.

