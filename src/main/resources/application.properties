spring.application.name=core

# DigitalOcean App Platform (y similares) inyectan PORT.
server.port=${PORT:8080}

# Health público para comprobaciones del balanceador (resto de actuator sigue protegido por Security).
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Datasource configuration with environment variable overrides
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool settings
spring.datasource.hikari.connection-timeout=45000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000

# Explicit SSL for PostgreSQL driver
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholder-replacement=false

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

