# H2 no aplica migraciones Postgres (p. ej. text[]); el esquema de test lo genera Hibernate.
spring.flyway.enabled=false
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.security.jwt.secret=test-jwt-secret-key-minimum-32-characters-long
app.security.admin.username=admin@test.local
