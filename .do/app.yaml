name: aeg-core
region: nyc
services:
  - name: core-api
    github:
      repo: CarlosLDC/aeg-core
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    health_check:
      http_path: /actuator/health
      # En apps-s-1vcpu-1gb el arranque (Flyway + JPA + Security) suele tardar 90–150s.
      initial_delay_seconds: 180
      period_seconds: 20
      timeout_seconds: 15
      failure_threshold: 10
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://private-db-postgresql-nyc1-16442-do-user-35225255-0.l.db.ondigitalocean.com:25060/defaultdb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: doadmin
      - key: SPRING_DATASOURCE_PASSWORD
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: MQTT_URL
        value: tcp://10.116.0.4:1883
      - key: MQTT_USER
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: MQTT_PASS
        value: SET_IN_APP_PLATFORM
        type: SECRET
      # Suscripción entrante + monitor WebSocket (/ws/mqtt). Ajusta MQTT_INBOUND_TOPIC al patrón real de los dispositivos.
      - key: MQTT_INBOUND_ENABLED
        value: "true"
      - key: MQTT_INBOUND_TOPIC
        value: "aeg/telemetry/#"
