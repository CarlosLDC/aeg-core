name: aeg-core
region: nyc
services:
  - name: core-api
    github:
      repo: CarlosLDC/aeg-core
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    health_check:
      # Liveness only (JVM up). Readiness incluye BD y puede fallar durante Flyway/Hikari al arrancar.
      http_path: /actuator/health/liveness
      # En apps-s-1vcpu-1gb el arranque (Flyway repair+migrate + JPA + Security) puede superar 150s.
      initial_delay_seconds: 240
      period_seconds: 20
      timeout_seconds: 15
      failure_threshold: 12
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: APP_SECURITY_JWT_SECRET
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: APP_SECURITY_ADMIN_USERNAME
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: APP_SECURITY_ADMIN_PASSWORD
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://aeg-core-admin.vercel.app,https://aeg-admin.tech,https://www.aeg-admin.tech
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://private-db-postgresql-nyc1-16442-do-user-35225255-0.l.db.ondigitalocean.com:25060/defaultdb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: doadmin
      - key: SPRING_DATASOURCE_PASSWORD
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: MQTT_URL
        value: tcp://206.189.231.128:1883
      - key: MQTT_USER
        value: SET_IN_APP_PLATFORM
        type: SECRET
      - key: MQTT_PASS
        value: SET_IN_APP_PLATFORM
        type: SECRET
      # Suscripción entrante + monitor WebSocket (/ws/mqtt). Ajusta MQTT_INBOUND_TOPIC al patrón real de los dispositivos.
      - key: MQTT_INBOUND_ENABLED
        value: "true"
      - key: MQTT_INBOUND_TOPIC
        value: "aeg/telemetry/#"
      - key: MQTT_ENAJENACION_INBOUND_TOPIC
        value: "+/AEG_Fiscal/Integracion/CmdServer"
      - key: MQTT_ENAJENACION_TICKET_FOOTER_LINES
        value: ""
