name: aeg-core
region: nyc
services:
  - name: core-api
    github:
      repo: segarivera/aeg-core # Ajustar si el nombre del repo es distinto
      branch: main
      deploy_on_push: true
    build_command: ./mvnw -DskipTests clean install
    run_command: java -jar target/core-0.0.1-SNAPSHOT.jar
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${db.HOSTNAME}:${db.PORT}/${db.DATABASE}?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: ${db.USERNAME}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${db.PASSWORD}
databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
