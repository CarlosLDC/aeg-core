name: API Integration Tests

on:
  push:    # run on pushes to any branch
  pull_request: # run on pull requests targeting any branch

jobs:
  test:
    name: Newman API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Newman Tests (Cloud)
        run: |
          npx newman run postman/aeg-core.postman_collection.json \
            -e postman/aeg-core.cloud.postman_environment.json \
            --reporters cli
